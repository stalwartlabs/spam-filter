[version]
spam-filter = "2.0.5"
server = "0.11.0"

[asn]
type = "resource"
expires = "1d"
timeout = "5m"
max-size = 104857600

[asn.urls]
asn = [ "https://cdn.jsdelivr.net/npm/@ip-location-db/asn/asn-ipv4.csv", 
        "https://cdn.jsdelivr.net/npm/@ip-location-db/asn/asn-ipv6.csv" ]
geo = [ "https://cdn.jsdelivr.net/npm/@ip-location-db/geolite2-geo-whois-asn-country/geolite2-geo-whois-asn-country-ipv4.csv", 
        "https://cdn.jsdelivr.net/npm/@ip-location-db/geolite2-geo-whois-asn-country/geolite2-geo-whois-asn-country-ipv6.csv" ]


[spam-filter.rule.STWT_SHORT_BAD_HEADERS]
enable = true
scope = "any"
priority = 1000
condition = [ { if = "$MISSING_ESSENTIAL_HEADERS && $SINGLE_SHORT_PART", then = "'SHORT_PART_BAD_HEADERS'" },
 			  { else = false } ]

[spam-filter.rule.STWT_FORGED_RCPT_LIST]
enable = true
scope = "any"
priority = 1001
condition = [ { if = "$FORGED_RECIPIENTS && $MAILLIST", then = "'FORGED_RECIPIENTS_MAILLIST'" },
 			  { else = false } ]

[spam-filter.rule.STWT_FORGED_SENDER_LIST]
enable = true
scope = "any"
priority = 1002
condition = [ { if = "$FORGED_SENDER && $MAILLIST", then = "'FORGED_SENDER_MAILLIST'" },
 			  { else = false } ]

[spam-filter.rule.STWT_DMARC_ALLOW_WITH_FAIL]
enable = true
scope = "any"
priority = 1003
condition = [ { if = "$DMARC_POLICY_ALLOW && ($SPF_SOFTFAIL || $SPF_FAIL || $DKIM_REJECT)", then = "'DMARC_POLICY_ALLOW_WITH_FAILURES'" },
 			  { else = false } ]

[spam-filter.rule.STWT_AUTH_NA]
enable = true
scope = "any"
priority = 1004
condition = [ { if = "$DKIM_NA && $SPF_NA && $DMARC_NA && $ARC_NA", then = "'AUTH_NA'" },
 			  { else = false } ]

[spam-filter.rule.STWT_AUTH_NA_FAIL]
enable = true
scope = "any"
priority = 1005
condition = [ { if = "!($DKIM_NA && $SPF_NA && $DMARC_NA && $ARC_NA) && ($DKIM_NA || $DKIM_TEMPFAIL || $DKIM_PERMFAIL) && ($SPF_NA || $SPF_DNSFAIL) && $DMARC_NA && ($ARC_NA || $ARC_DNSFAIL)", then = "'AUTH_NA_OR_FAIL'" },
 			  { else = false } ]

[spam-filter.rule.STWT_BOUNCE_NO_AUTH]
enable = true
scope = "any"
priority = 1006
condition = [ { if = "($AUTH_NA || $AUTH_NA_OR_FAIL) && ($BOUNCE || $SUBJ_BOUNCE_WORDS)", then = "'BOUNCE_NO_AUTH'" },
 			  { else = false } ]

[spam-filter.rule.STWT_HACKED_WP_PHISHING]
enable = true
scope = "any"
priority = 1007
condition = [ { if = "($X_HDR_X_PHP_ORIGINATING_SCRIPT || $HAS_PHPMAILER_SIG) && $HAS_WP_URI && ($PHISHING || $CRACKED_SURBL || $PH_SURBL_MULTI || $DBL_PHISH || $DBL_ABUSE_PHISH || $URIBL_BLACK || $PHISHED_OPENPHISH || $PHISHED_PHISHTANK)", then = "'HACKED_WP_PHISHING'" },
 			  { else = false } ]

[spam-filter.rule.STWT_COMPROMISED_ACCT_BULK]
enable = true
scope = "any"
priority = 1008
condition = [ { if = "($X_HDR_X_ORIGINATING_IP || $RCVD_VIA_SMTP_AUTH) && $DCC_BULK", then = "'COMPROMISED_ACCT_BULK'" },
 			  { else = false } ]

[spam-filter.rule.STWT_UNDISC_RCPTS_BULK]
enable = true
scope = "any"
priority = 1009
condition = [ { if = "$DCC_BULK && ($MISSING_TO || $UNDISC_RCPT)", then = "'UNDISC_RCPTS_BULK'" },
 			  { else = false } ]

[spam-filter.rule.STWT_RCVD_UNAUTH_PBL]
enable = true
scope = "any"
priority = 1010
condition = [ { if = "$RECEIVED_SPAMHAUS_PBL && !$RCVD_VIA_SMTP_AUTH", then = "'RCVD_UNAUTH_PBL'" },
 			  { else = false } ]

[spam-filter.rule.STWT_RCVD_DKIM_ARC_DNSWL_MED]
enable = true
scope = "any"
priority = 1011
condition = [ { if = "($DKIM_ALLOW || $ARC_ALLOW) && $RCVD_IN_DNSWL_MED", then = "'RCVD_DKIM_ARC_DNSWL_MED'" },
 			  { else = false } ]

[spam-filter.rule.STWT_RCVD_DKIM_ARC_DNSWL_HI]
enable = true
scope = "any"
priority = 1012
condition = [ { if = "($DKIM_ALLOW || $ARC_ALLOW) && $RCVD_IN_DNSWL_HI", then = "'RCVD_DKIM_ARC_DNSWL_HI'" },
 			  { else = false } ]

[spam-filter.rule.STWT_AUTOGEN_PHP_SPAMMY]
enable = true
scope = "any"
priority = 1013
condition = [ { if = "($X_HDR_X_PHP_ORIGINATING_SCRIPT || $HAS_PHPMAILER_SIG || $X_HDR_X_PHP_SCRIPT) && ($SUBJECT_ENDS_QUESTION || $SUBJECT_ENDS_EXCLAIM || $MANY_INVISIBLE_PARTS)", then = "'AUTOGEN_PHP_SPAMMY'" },
 			  { else = false } ]

[spam-filter.rule.STWT_PHISH_EMOTION]
enable = true
scope = "any"
priority = 1014
condition = [ { if = "($PHISHING || $DBL_PHISH || $PHISHED_OPENPHISH || $PHISHED_PHISHTANK) && ($SUBJECT_ENDS_QUESTION || $SUBJECT_ENDS_EXCLAIM)", then = "'PHISH_EMOTION'" },
 			  { else = false } ]

[spam-filter.rule.STWT_HAS_ANON_DOMAIN]
enable = true
scope = "any"
priority = 1015
condition = [ { if = "$HAS_GUC_PROXY_URI || $URIBL_RED || $DBL_ABUSE_REDIR || $HAS_ONION_URI", then = "'HAS_ANON_DOMAIN'" },
 			  { else = false } ]

[spam-filter.rule.STWT_VIOLATED_DIRECT_SPF]
enable = true
scope = "any"
priority = 1016
condition = [ { if = "($SPF_FAIL || $SPF_SOFTFAIL) && ($RCVD_COUNT_ZERO || $RCVD_NO_TLS_LAST)", then = "'VIOLATED_DIRECT_SPF'" },
 			  { else = false } ]

[spam-filter.rule.STWT_FREEMAIL_AFF]
enable = true
scope = "any"
priority = 1017
condition = [ { if = "($FREEMAIL_FROM || $FREEMAIL_ENV_FROM || $FREEMAIL_REPLY_TO) && ($TO_DN_RECIPIENTS || $UNDISC_RCPT) && ($FROM_NAME_HAS_TITLE || $FREEMAIL_REPLY_TO_NEQ_FROM_DOM)", then = "'FREEMAIL_AFF'" },
 			  { else = false } ]

[spam-filter.rule.STWT_REDIRECTOR_URL_ONLY]
enable = true
scope = "any"
priority = 1018
condition = [ { if = "$URL_ONLY && $REDIRECTOR_URL", then = "'REDIRECTOR_URL_ONLY'" },
			  { else = false } ]

[spam-filter.rule.STWT_THREAD_HIJACKING]
enable = true
scope = "any"
priority = 1019
condition = [ { if = "$FAKE_REPLY && $RCVD_VIA_SMTP_AUTH && (!$RECEIVED_SPAMHAUS_PBL || $RECEIVED_SPAMHAUS_XBL || $RECEIVED_SPAMHAUS_SBL)", then = "'THREAD_HIJACKING_FROM_INJECTOR'" },
			  { else = false } ]

[spam-filter.rule.STWT_DKIM_SIGNED]
enable = true
scope = "any"
priority = 1020
condition = [ { if = "$X_HDR_DKIM_SIGNATURE", then = "'DKIM_SIGNED'" },
			  { else = false } ]

[spam-filter.rule.STWT_ARC_SIGNED]
enable = true
scope = "any"
priority = 1021
condition = [ { if = "$X_HDR_ARC_SEAL", then = "'ARC_SIGNED'" },
			  { else = false } ]

[spam-filter.rule.STWT_FREEMAIL_RTO_NEQ_DOM]
enable = true
scope = "any"
priority = 1022
condition = [ { if = "$FREEMAIL_REPLY_TO && from.domain != reply_to.domain", then = "'FREEMAIL_REPLY_TO_NEQ_FROM_DOM'" },
			  { else = false } ]

[spam-filter.rule.STWT_SUSPICIOUS_MDN]
enable = true
scope = "any"
priority = 1023
condition = [ { if = "($FREEMAIL_DNT || $DISPOSABLE_DNT) && !($FREEMAIL_FROM || $FREEMAIL_ENV_FROM)", then = "'SUSPICIOUS_MDN'" },
			  { else = false } ]

[spam-filter.rule.STWT_SUSPICIOUS_AUTH_ORIGIN]
enable = true
scope = "any"
priority = 1024
condition = [ { if = "($X_HDR_X_ORIGINATING_IP || $RCVD_VIA_SMTP_AUTH) && ($RECEIVED_SPAMHAUS_PBL || $RECEIVED_SPAMHAUS_XBL || $RECEIVED_SPAMHAUS_SBL || $RECEIVED_BLOCKLISTDE)", then = "'SUSPICIOUS_AUTH_ORIGIN'" },
			  { else = false } ]

[spam-filter.rule.STWT_SABUSE_FROM_INJECTOR]
enable = true
scope = "any"
priority = 1025
condition = [ { if = "$SUSPICIOUS_AUTH_ORIGIN && ($RCVD_HELO_USER || $FAKE_REPLY || $HAS_IPFS_GATEWAY_URL || $HTML_SHORT_LINK_IMG_1)", then = "'ABUSE_FROM_INJECTOR'" },
			  { else = false } ]

[spam-filter.rule.STWT_MIME_BAD_EXT_WITH_BAD_UNICODE]
enable = true
scope = "any"
priority = 1026
condition = [ { if = "$MIME_BAD_EXTENSION && $MIME_BAD_UNICODE", then = "'MIME_BAD_EXT_WITH_BAD_UNICODE'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_SEO_WORD]
enable = true
scope = "any"
priority = 1027
condition = [ { if = "contains(subject.words, 'SEO') || contains(body.words, 'SEO')", then = "'HAS_SEO_WORD'" },
			  { else = false } ]

[spam-filter.rule.STWT_SEO_SPAM]
enable = true
scope = "any"
priority = 1028
condition = [ { if = "$HAS_SEO_WORD && ($RCPT_DOMAIN_IN_BODY || $RCPT_IN_BODY || $FREEMAIL_FROM)", then = "'SEO_SPAM'" },
			  { else = false } ]

[spam-filter.rule.STWT_DIRECT_TO_MX]
enable = true
scope = "any"
priority = 1029
condition = [ { if = "$RCVD_COUNT_ZERO && !$RCVD_VIA_SMTP_AUTH && ($X_HDR_USER_AGENT || $X_HDR_X_MAILER)", then = "'DIRECT_TO_MX'" },
			  { else = false } ]

[spam-filter.rule.STWT_SHORT_LINK_IMG]
enable = true
scope = "any"
priority = 1030
condition = [ { if = "!$HAS_LINK_TO_LARGE_IMG", then = "false" },
			  { if = "$HTML_SHORT_1", then = "'HTML_SHORT_LINK_IMG_1'" },
			  { if = "$HTML_SHORT_2", then = "'HTML_SHORT_LINK_IMG_2'" },
			  { if = "$HTML_SHORT_3", then = "'HTML_SHORT_LINK_IMG_3'" },
			  { else = false } ]


[spam-filter.dnsbl.server.STWT_RBL_SPAMHAUS_IP]
enable = true
zone = "ip_reverse + '.zen.spamhaus.org'"
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 2", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_SBL', 'RECEIVED_SPAMHAUS_SBL')" },
        { if = "octets[3] == 3", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_CSS', 'RECEIVED_SPAMHAUS_CSS')" },
        { if = "octets[3] >= 4 && octets[3] <= 7", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_XBL', 'RECEIVED_SPAMHAUS_XBL')" },
        { if = "octets[3] == 9", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_DROP', 'RECEIVED_SPAMHAUS_DROP')" },
        { if = "(octets[3] == 10 || octets[3] == 11)", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_PBL', 'RECEIVED_SPAMHAUS_PBL')" },
        { if = "octets[3] == 254", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_BLOCKED_OPENRESOLVER', 'RECEIVED_SPAMHAUS_BLOCKED_OPENRESOLVER')" },
        { if = "octets[3] == 255", then = "if_then(location == 'tcp', 'RBL_SPAMHAUS_BLOCKED', 'RECEIVED_SPAMHAUS_BLOCKED')" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_MAILSPIKE_IP]
enable = true
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.rep.mailspike.net'" },
		{ else = false } ]
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 10", then = "'RBL_MAILSPIKE_WORST'" },
        { if = "octets[3] == 11", then = "'RBL_MAILSPIKE_VERYBAD'" },
        { if = "octets[3] == 12", then = "'RBL_MAILSPIKE_BAD'" },
        { if = "octets[3] >= 13 && octets[3] <= 16", then = "'RWL_MAILSPIKE_NEUTRAL'" },
        { if = "octets[3] == 17", then = "'RWL_MAILSPIKE_POSSIBLE'" },
        { if = "octets[3] == 18", then = "'RWL_MAILSPIKE_GOOD'" },
        { if = "octets[3] == 19", then = "'RWL_MAILSPIKE_VERYGOOD'" },
        { if = "octets[3] == 20", then = "'RWL_MAILSPIKE_EXCELLENT'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_SENDERSCORE_IP]
enable = false
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.bl.score.senderscore.com'" },
		{ else = false } ]
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 1", then = "'RBL_SENDERSCORE_BOT'" },
        { if = "octets[3] == 2", then = "'RBL_SENDERSCORE_NA'" },
        { if = "octets[3] == 3", then = "'RBL_SENDERSCORE_NA_BOT'" },
        { if = "octets[3] == 4", then = "'RBL_SENDERSCORE_PRST'" },
        { if = "octets[3] == 5", then = "'RBL_SENDERSCORE_PRST_BOT'" },
        { if = "octets[3] == 6", then = "'RBL_SENDERSCORE_PRST_NA'" },
        { if = "octets[3] == 7", then = "'RBL_SENDERSCORE_PRST_NA_BOT'" },
        { if = "octets[3] == 8", then = "'RBL_SENDERSCORE_SUS_ATT'" },
        { if = "octets[3] == 10", then = "'RBL_SENDERSCORE_SUS_ATT_NA'" },
        { if = "octets[3] == 11", then = "'RBL_SENDERSCORE_SUS_ATT_NA_BOT'" },
        { if = "octets[3] == 14", then = "'RBL_SENDERSCORE_SUS_ATT_PRST_NA'" },
        { if = "octets[3] == 15", then = "'RBL_SENDERSCORE_SUS_ATT_PRST_NA_BOT'" },
        { if = "octets[3] == 16", then = "'RBL_SENDERSCORE_SCORE'" },
        { if = "octets[3] == 18", then = "'RBL_SENDERSCORE_SCORE_NA'" },
        { if = "octets[3] == 20", then = "'RBL_SENDERSCORE_SCORE_PRST'" },
        { if = "octets[3] == 22", then = "'RBL_SENDERSCORE_SCORE_PRST_NA'" },
        { if = "octets[3] == 26", then = "'RBL_SENDERSCORE_SCORE_SUS_ATT_NA'" },
        { if = "octets[3] == 255", then = "'RBL_SENDERSCORE_BLOCKED'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_SENDERSCORE_REPUT_IP]
enable = true
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.score.senderscore.com'" },
		{ else = false } ]
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] < 10", then = "'RBL_SENDERSCORE_REPUT_0'" },
        { if = "octets[3] >= 10 && octets[3] <= 19", then = "'RBL_SENDERSCORE_REPUT_1'" },
        { if = "octets[3] >= 20 && octets[3] <= 29", then = "'RBL_SENDERSCORE_REPUT_2'" },
        { if = "octets[3] >= 30 && octets[3] <= 39", then = "'RBL_SENDERSCORE_REPUT_3'" },
        { if = "octets[3] >= 40 && octets[3] <= 49", then = "'RBL_SENDERSCORE_REPUT_4'" },
        { if = "octets[3] >= 50 && octets[3] <= 59", then = "'RBL_SENDERSCORE_REPUT_5'" },
        { if = "octets[3] >= 60 && octets[3] <= 69", then = "'RBL_SENDERSCORE_REPUT_6'" },
        { if = "octets[3] >= 70 && octets[3] <= 79", then = "'RBL_SENDERSCORE_REPUT_7'" },
        { if = "octets[3] >= 80 && octets[3] <= 89", then = "'RBL_SENDERSCORE_REPUT_8'" },
        { if = "octets[3] >= 90 && octets[3] <= 100", then = "'RBL_SENDERSCORE_REPUT_9'" },
        { if = "octets[3] == 255", then = "'RBL_SENDERSCORE_REPUT_BLOCKED'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_SEM_IP]
enable = true
zone = [ { if = "location == 'tcp' && is_v4", then = "ip_reverse + '.bl.spameatingmonkey.net'" },
        { if = "location == 'tcp' && is_v6", then = "ip_reverse + '.bl.ipv6.spameatingmonkey.net'" },
		{ else = false } ]
tag = [ { if = "!is_empty(ip)", then = "'RBL_SEM'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_VIRUSFREE_IP]
enable = true
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.bip.virusfree.cz'" },
		{ else = false } ]
tag = [ { if = "ip == '127.0.0.2'", then = "'RBL_VIRUSFREE_BOTNET'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_SPAMCOP_IP]
enable = true
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.bl.spamcop.net'" },
		{ else = false } ]
tag = [ { if = "!is_empty(ip)", then = "'RBL_SPAMCOP'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_BARRACUDA_IP]
enable = true
zone = [ { if = "location == 'tcp'", then = "ip_reverse + '.b.barracudacentral.org'" },
		{ else = false } ]
tag = [ { if = "!is_empty(ip)", then = "'RBL_BARRACUDA'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_RBL_BLOCKLISTDE_IP]
enable = true
zone = "ip_reverse + '.bl.blocklist.de'"
tag = [ { if = "!is_empty(ip) && location == 'tcp'", then = "'RBL_BLOCKLISTDE'" },
        { if = "!is_empty(ip)", then = "'RECEIVED_BLOCKLISTDE'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_DNSWL_IP]
enable = true
zone = "ip_reverse + '.list.dnswl.org'"
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 0", then = "'RCVD_IN_DNSWL_NONE'" },
        { if = "octets[3] == 1", then = "'RCVD_IN_DNSWL_LOW'" },
        { if = "octets[3] == 2", then = "'RCVD_IN_DNSWL_MED'" },
        { if = "octets[3] == 3", then = "'RCVD_IN_DNSWL_HI'" },
        { if = "octets[3] == 255", then = "'DNSWL_BLOCKED'" },
		{ else = false } ]
scope = "ip"

[spam-filter.dnsbl.server.STWT_DBL_SPAMHAUS_DOMAIN]
enable = true
zone = "value + '.dbl.spamhaus.org'"
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 2", then = "'DBL_SPAM'" },
        { if = "octets[3] == 4", then = "'DBL_PHISH'" },
        { if = "octets[3] == 5", then = "'DBL_MALWARE'" },
        { if = "octets[3] == 6", then = "'DBL_BOTNET'" },
        { if = "octets[3] == 102", then = "'DBL_ABUSE'" },
        { if = "octets[3] == 103", then = "'DBL_ABUSE_REDIR'" },
        { if = "octets[3] == 104", then = "'DBL_ABUSE_PHISH'" },
        { if = "octets[3] == 105", then = "'DBL_ABUSE_MALWARE'" },
        { if = "octets[3] == 106", then = "'DBL_ABUSE_BOTNET'" },
        { if = "octets[3] == 254", then = "'DBL_BLOCKED_OPENRESOLVER'" },
        { if = "octets[3] == 255", then = "'DBL_BLOCKED'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_SURBL_DOMAIN]
enable = true
zone = "value + '.multi.surbl.org'"
tag = [ { if = "octets[3] == 128", then = "'CRACKED_SURBL'" },
        { if = "octets[3] == 64", then = "'ABUSE_SURBL'" },
        { if = "octets[3] == 32", then = "'CT_SURBL'" },
        { if = "octets[3] == 16", then = "'MW_SURBL_MULTI'" },
        { if = "octets[3] == 8", then = "'PH_SURBL_MULTI'" },
        { if = "octets[3] == 4", then = "'DM_SURBL'" },
        { if = "octets[3] == 1", then = "'SURBL_BLOCKED'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_URIBL_DOMAIN]
enable = true
zone = "value + '.multi.uribl.com'"
tag = [ { if = "octets[3] == 1", then = "'URIBL_BLOCKED'" },
        { if = "octets[3] == 2", then = "'URIBL_BLACK'" },
        { if = "octets[3] == 4", then = "'URIBL_GREY'" },
        { if = "octets[3] == 8", then = "'URIBL_RED'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_SEM_URIBL]
enable = true
zone = "value + '.uribl.spameatingmonkey.net'"
tag = [ { if = "ip == '127.0.0.2'", then = "'SEM_URIBL'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_SEM_URIBL_FRESH15]
enable = true
zone = "value + '.fresh15.spameatingmonkey.net'"
tag = [ { if = "ip == '127.0.0.2'", then = "'SEM_URIBL_FRESH15'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_DWL_DNSWL_DOMAIN]
enable = true
zone = [ { if = "location == 'dkim_pass'", then = "value + '.dwl.dnswl.org'" },
		{ else = false } ]
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 0", then = "'DWL_DNSWL_NONE'" },
        { if = "octets[3] == 1", then = "'DWL_DNSWL_LOW'" },
        { if = "octets[3] == 2", then = "'DWL_DNSWL_MED'" },
        { if = "octets[3] == 3", then = "'DWL_DNSWL_HI'" },
        { if = "octets[3] == 255", then = "'DWL_DNSWL_BLOCKED'" },
		{ else = false } ]
scope = "domain"

[spam-filter.dnsbl.server.STWT_MSBL_EBL_EMAIL]
enable = true
zone = "hash(email, 'sha1') + '.ebl.msbl.org'"
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[2] == 0 && (octets[3] == 2 || octets[3] == 3)", then = "'MSBL_EBL'" },
        { if = "octets[2] == 1 && (octets[3] == 2 || octets[3] == 3)", then = "'MSBL_EBL_GREY'" },
		{ else = false } ]
scope = "email"

[spam-filter.dnsbl.server.STWT_SURBL_HASHBL_DOMAIN]
enable = true
zone = [ { if = "key_exists('surbl-hashbl', host)", then = "hash(host + path, 'md5') + '.hashbl.surbl.org'" },
		{ else = false } ]
tag = [ { if = "octets[0] != 127", then = "false" },
        { if = "octets[3] == 8", then = "'SURBL_HASHBL_PHISH'" },
        { if = "octets[3] == 16", then = "'SURBL_HASHBL_MALWARE'" },
        { if = "octets[3] == 64", then = "'SURBL_HASHBL_ABUSE'" },
        { if = "octets[3] == 128", then = "'SURBL_HASHBL_CRACKED'" },
        { if = "octets[2] == 1", then = "'SURBL_HASHBL_EMAIL'" },
		{ else = false } ]
scope = "url"


[spam-filter.rule.STWT_SVC_OR_TAGGED]
enable = true
scope = "any"
priority = 10
condition = [ { if = "is_intersect(['www-data', 'anonymous', 'ftp', 'apache', 'nobody', 'guest', 'nginx', 'web', 'www'], [from.local, env_from.local, reply_to.local])", then = "'FROM_SERVICE_ACCT'" },
              { if = "contains(from.local, '+')", then = "'TAGGED_FROM'" },
			  { else = false } ]

[spam-filter.rule.STWT_WWW_DOMAIN]
enable = true
scope = "any"
priority = 11
condition = [ { if = "starts_with(from.domain, 'www.') || starts_with(reply_to.domain, 'www.')", then = "'WWW_DOT_DOMAIN'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_TITLE]
enable = true
scope = "any"
priority = 12
condition = [ { if = "is_intersect(['mr.', 'mrs.', 'ms.', 'dr.', 'prof.', 'rev.', 'hon.'], split(to_lowercase(from.name), ' '))", then = "'FROM_NAME_HAS_TITLE'" },
              { if = "is_intersect(['mr.', 'mrs.', 'ms.', 'dr.', 'prof.', 'rev.', 'hon.'], split(to_lowercase(reply_to.name), ' '))", then = "'REPLYTO_EMAIL_HAS_TITLE'" },
			  { else = false } ]

[spam-filter.rule.STWT_FROM_NAME_SPACE]
enable = true
scope = "any"
priority = 13
condition = [ { if = "contains(from.name, '  ')", then = "'FROM_NAME_EXCESS_SPACE'" },
			  { else = false } ]

[spam-filter.rule.STWT_BOUNCE]
enable = true
scope = "any"
priority = 14
condition = [ { if = "is_empty(env_from) && ($IS_DSN || $HAS_MESSAGE_PARTS || ($X_HDR_X_MDDSN_MESSAGE && contains_ignore_case(from.name, 'mdaemon')))", then = "'BOUNCE'" },
			  { else = false } ]

[spam-filter.rule.STWT_RCPT_DOMAIN_IN_MESSAGE]
enable = true
scope = "any"
priority = 15
condition = [ { if = "$RCPT_DOMAIN_IN_SUBJECT && ($RCPT_DOMAIN_IN_BODY || $RCPT_IN_BODY)", then = "'RCPT_DOMAIN_IN_MESSAGE'" },
			  { else = false } ]

[spam-filter.rule.STWT_TRUSTED_DOMAIN]
enable = true
scope = "any"
priority = 16
condition = [ { if = "$DMARC_POLICY_ALLOW && key_exists('trusted-domains', from.domain)", then = "'TRUSTED_DOMAIN'" },
			  { else = false } ]

[spam-filter.rule.STWT_BLOCKED_DOMAIN]
enable = true
scope = "any"
priority = 17
condition = [ { if = "key_exists('blocked-domains', from.domain)", then = "'BLOCKED_DOMAIN'" },
			  { else = false } ]


[spam-filter.rule.STWT_R_UNDISC_RCPT]
enable = true
scope = "header"
priority = 60
condition = [ { if = "contains(['to', 'cc', 'bcc'], name_lower) && contains(raw_lower, 'undisclosed')", then = "'UNDISC_RCPT'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_X_AS]
enable = true
scope = "header"
priority = 61
condition = [ { if = "name_lower == 'x-authenticated-sender' && contains(value, ': ')", then = "'HAS_X_AS'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_X_GMSV]
enable = true
scope = "header"
priority = 62
condition = [ { if = "name_lower == 'x-get-message-sender-via' && contains(value_lower, 'authenticated_id:')", then = "'HAS_X_GMSV'" },
			  { else = false } ]

[spam-filter.rule.STWT_HIDDEN_SOURCE_OBJ]
enable = true
scope = "header"
priority = 63
condition = [ { if = "contains(['x-source', 'x-source-args', 'x-source-dir'], name_lower) && contains(value, '../')", then = "'HIDDEN_SOURCE_OBJ'" },
			  { else = false } ]

[spam-filter.rule.STWT_X_PHP_EVAL]
enable = true
scope = "header"
priority = 64
condition = [ { if = "contains(value_lower, 'eval()') && contains(['x-php-originating-script', 'x-php-script'], name_lower)", then = "'X_PHP_EVAL'" },
			  { else = false } ]

[spam-filter.rule.STWT_HIDDEN_SOURCE_PHP]
enable = true
scope = "header"
priority = 65
condition = [ { if = "contains(value, '../') && contains(['x-php-originating-script', 'x-php-script'], name_lower)", then = "'HIDDEN_SOURCE_OBJ'" },
			  { else = false } ]

[spam-filter.rule.STWT_UNITEDINTERNET_SPAM]
enable = true
scope = "header"
priority = 66
condition = [ { if = "contains(['x-ui-filterresults', 'x-ui-out-filterresults', 'x-source-dir'], name_lower) && contains(value_lower, 'junk')", then = "'UNITEDINTERNET_SPAM'" },
			  { else = false } ]

[spam-filter.rule.STWT_SPAM_FLAG]
enable = true
scope = "header"
priority = 67
condition = [ { if = "contains(['x-spam', 'x-spam-flag', 'x-spam-status'], name_lower) && (contains(value_lower, 'yes') || contains(value_lower, 'true') || contains(value_lower, 'spam'))", then = "'SPAM_FLAG'" },
			  { else = false } ]

[spam-filter.rule.STWT_KLMS_SPAM]
enable = true
scope = "header"
priority = 68
condition = [ { if = "name_lower == 'x-klms-antispam-status' && contains(value_lower, 'spam')", then = "'KLMS_SPAM'" },
			  { else = false } ]

[spam-filter.rule.STWT_XM_CASE]
enable = true
scope = "header"
priority = 69
condition = [ { if = "name_lower == 'x-mailer' && name != 'X-Mailer'", then = "'XM_CASE'" },
			  { else = false } ]

[spam-filter.rule.STWT_XM_UA_NO_VERSION]
enable = true
scope = "header"
priority = 70
condition = [ { if = "(name_lower == 'user_agent' || name_lower == 'x-mailer') && !is_empty(value) && !has_digits(value)", then = "'XM_UA_NO_VERSION'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_PHPMAILER_SIG]
enable = true
scope = "header"
priority = 71
condition = [ { if = "name_lower == 'x-mailer' && contains(value_lower, 'phpmailer')", then = "'HAS_PHPMAILER_SIG'" },
			  { else = false } ]



[spam-filter.llm]
enable = false
model = ""
temperature = "0.5"
prompt = "You are an AI assistant specialized in analyzing email content to detect unsolicited, commercial, or harmful messages. Your task is to examine the provided email, including its subject line, and determine if it falls into any of these categories. Please follow these steps:

- Carefully read the entire email content, including the subject line.
- Look for indicators of unsolicited messages, such as:
   * Lack of prior relationship or consent
   * Mass-mailing characteristics
   * Vague or misleading sender information
- Identify commercial content by checking for:
   * Promotional language
   * Product or service offerings
   * Call-to-action for purchases
- Detect potentially harmful content by searching for:
   * Phishing attempts (requests for personal information, suspicious links)
   * Malware indicators (suspicious attachments, urgent calls to action)
   * Scams or fraudulent schemes
- Analyze the overall tone, intent, and legitimacy of the email.
- Determine the most appropriate single category for the email: Unsolicited, Commercial, Harmful, or Legitimate.
- Assess your confidence level in this determination: High, Medium, or Low.
- Provide a brief explanation for your determination.
- Format your response as follows, separated by commas: Category,Confidence,Explanation
  * Example: Unsolicited,High,The email contains mass-mailing characteristics without any prior relationship context.

Here's the email to analyze, please provide your analysis based on the above instructions, ensuring your response is in the specified comma-separated format:"
separator = ","
categories = ["Unsolicited", "Commercial", "Harmful", "Legitimate"]
confidence = ["High", "Medium", "Low"]

[spam-filter.llm.index]
category = 0
confidence = 1
explanation = 2


[spam-filter.rule.STWT_TO_DN_RECIPIENTS]
enable = true
scope = "email"
priority = 60
condition = [ { if = "contains(['to', 'cc', 'bcc'], location) && contains_ignore_case(name, 'recipient')", then = "'TO_DN_RECIPIENTS'" },
			  { else = false } ]

[spam-filter.rule.STWT_INFO_INFO_LU]
enable = true
scope = "email"
priority = 61
condition = [ { if = "contains(['to', 'cc', 'bcc'], location) && local == 'info' && from.local == 'info' && $X_HDR_LIST_UNSUBSCRIBE", then = "'INFO_TO_INFO_LU'" },
			  { else = false } ]

[spam-filter.rule.STWT_TAGGED_RCPT]
enable = true
scope = "email"
priority = 62
condition = [ { if = "contains(['to', 'cc', 'bcc'], location) && contains(local, '+')", then = "'TAGGED_RCPT'" },
			  { else = false } ]

[spam-filter.rule.STWT_FREE_OR_DISP]
enable = true
scope = "email"
priority = 63
condition = [ { if = "!contains(['env_from', 'from', 'reply_to', 'to', 'cc', 'bcc', 'dnt'], location) || is_empty(sld)", then = "false" },
			  { if = "key_exists('stwt_free_domains', domain)", then = "'FREEMAIL_' + to_uppercase(location)" },
			  { if = "key_exists('stwt_disposable_domains', domain)", then = "'DISPOSABLE_' + to_uppercase(location)" },
			  { else = false } ]


[spam-filter.rule.STWT_SUBJ_BOUNCE_WORDS]
enable = true
scope = "any"
priority = 20
condition = [ { if = "(contains(subject, 'delivery') && 
            (contains(subject, 'failed') || 
             contains(subject, 'report') || 
             contains(subject, 'status') || 
             contains(subject, 'warning'))) ||
         (contains(subject, 'failure') && 
            (contains(subject, 'delivery') || 
             contains(subject, 'notice') || 
             contains(subject, 'mail') )) ||
         (contains(subject, 'delivered') &&
            (contains(subject, 'couldn\\'t be') || 
             contains(subject, 'could not be') || 
             contains(subject, 'hasn\\'t been') || 
             contains(subject, 'has not been'))) ||
         contains(subject, 'returned mail') ||
         contains(subject, 'undeliverable') || 
         contains(subject, 'undelivered')", then = "'SUBJ_BOUNCE_WORDS'" },
			   { else = false } ]

[spam-filter.rule.STWT_BOUNCE_SUBJECT]
enable = true
scope = "any"
priority = 21
condition = [ { if = "!$BOUNCE && is_empty(env_from) && $SUBJ_BOUNCE_WORDS && (contains(from.local, 'postmaster') || contains(from.local, 'mailer-daemon'))", then = "'BOUNCE'" },
			   { else = false } ]

[spam-filter.rule.STWT_SUBJECT_HAS_SYMBOLS]
enable = true
scope = "any"
priority = 22
condition = [ { if = "ends_with(trim(subject), '!')", then = "'SUBJECT_ENDS_EXCLAIM'" },
              { if = "ends_with(trim(subject), '?')", then = "'SUBJECT_ENDS_QUESTION'" },
              { if = "contains(subject, '!')", then = "'SUBJECT_HAS_EXCLAIM'" },
              { if = "contains(subject, '?')", then = "'SUBJECT_HAS_QUESTION'" },
			  { else = false } ]

[spam-filter.rule.STWT_LONG_SUBJ]
enable = true
scope = "any"
priority = 23
condition = [ { if = "len(subject) > 200", then = "'LONG_SUBJ'" },
			  { else = false } ]

[spam-filter.rule.STWT_FAKE_REPLY]
enable = true
scope = "any"
priority = 24
condition = [ { if = "contains_ignore_case(['re', 'aw', 'antw', 'sv'], split_once(subject, ':')[0]) && !$X_HDR_IN_REPLY_TO && !$X_HDR_REFERENCES", then = "'FAKE_REPLY'" },
			  { else = false } ]



[spam-filter.rule.STWT_PHISHED_OPEN]
enable = true
scope = "url"
priority = 50
condition = [ { if = "key_exists('stwt_openphish', url)", then = "'PHISHED_OPENPHISH'" },
			  { else = false } ]

[spam-filter.rule.STWT_PHISHED_TANK]
enable = true
scope = "url"
priority = 51
condition = [ { if = "key_exists('stwt_phishtank', url)", then = "'PHISHED_PHISHTANK'" },
			  { else = false } ]

[spam-filter.rule.STWT_HAS_GOOGLE_URL]
enable = true
scope = "url"
priority = 52
condition = [ { if = "ends_with(host, 'googleusercontent.com') && starts_with(path_query, '/proxy/')", then = "'HAS_GUC_PROXY_URI'" },
              { if = "ends_with(host, 'firebasestorage.googleapis.com')", then = "'HAS_GOOGLE_FIREBASE_URL'" },
              { if = "starts_with(sld, 'google.') && contains(path_query, 'url?')", then = "'HAS_GOOGLE_REDIR'" },
    		  { else = false } ]

[spam-filter.rule.STWT_IPFS_OR_ONION]
enable = true
scope = "url"
priority = 53
condition = [ { if = "(contains(host, 'ipfs.') || contains(path_query, '/ipfs')) && contains(path_query, '/qm')", then = "'HAS_IPFS_GATEWAY_URL'" },
              { if = "ends_with(host, '.onion')", then = "'HAS_ONION_URI'" }, 
			  { else = false } ]

[spam-filter.rule.STWT_WP_COMPROMISED]
enable = true
scope = "url"
priority = 54
condition = [ { if = "starts_with(path, '/wp-content') || starts_with(path, '/wp-includes')", then = "'WP_COMPROMISED'" },
              { if = "starts_with(path, '/wp-')", then = "'HAS_WP_URI'" }, 
			  { else = false } ]

[spam-filter.rule.STWT_URI_HIDDEN_PATH]
enable = true
scope = "url"
priority = 55
condition = [ { if = "contains(path_query, '/../') && !contains(path_query, '/well-known') && !contains(path_query, '/well_known')", then = "'URI_HIDDEN_PATH'" },
			  { else = false } ]


